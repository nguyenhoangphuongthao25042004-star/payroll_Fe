name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # Clone source
      - name: Checkout code
        uses: actions/checkout@v4

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build image
        run: docker build -t nguyenhoangphuongthao/payroll-fe .

      # Push Docker Image
      - name: Push image
        run: docker push nguyenhoangphuongthao/payroll-fe